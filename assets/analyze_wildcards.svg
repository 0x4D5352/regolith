<svg xmlns="http://www.w3.org/2000/svg" width="1112" height="354" viewBox="0 0 1112 354"><defs><marker id="start-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="end-dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#94a3b8"/></marker></defs><style>
