		.analysis-legend-title { font-weight: bold; }
		.analysis-suggestion { font-style: italic; }
	</style><rect x="0" y="0" width="1112" height="354" fill="#000000"/><line x1="5" y1="41.5" x2="25" y2="41.5" stroke="#94a3b8" stroke-width="1.5" marker-start="url(#start-arrow)"/><line x1="520.4" y1="41.5" x2="533.4" y2="41.5" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#end-dot)"/><g transform="translate(25,10)"><g class="match"><path d="M 139 31.5 L 159 31.5 M 293 31.5 L 308 31.5 M 341.4 31.5 L 356.4 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5"/><g transform="translate(5,0)"><g><g class="repeat"><path d="M 0 31.5 Q 0 21.5 10 21.5 H 124 Q 134 21.5 134 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="skip-path"/><path d="M 134 31.5 Q 134 53 124 53 H 10 Q 0 53 0 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="loop-path"/><path d="M 72 48 L 67 53 L 72 58" fill="none" stroke="#94a3b8" stroke-width="1.5"/><g transform="translate(10,20)"><g class="any-character"><rect x="0" y="0" width="114" height="23" rx="8" ry="8"/><text x="57" y="15.1666666667" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">any character</text></g></g><line x1="0" y1="31.5" x2="10" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/><line x1="124" y1="31.5" x2="134" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/></g><rect x="-5" y="-5" width="144" height="73" rx="8" ry="8" fill="none" stroke="#3182ce" stroke-width="2" stroke-dasharray="6,3" class="analysis-border"/><circle cx="135" cy="-1" r="8" fill="#3182ce" class="analysis-badge"/><text x="135" y="3" fill="#fff" text-anchor="middle" class="analysis-badge-label">i</text><title>Leading .* without anchor</title></g></g><g transform="translate(159,0)"><g><g class="repeat"><path d="M 0 31.5 Q 0 21.5 10 21.5 H 124 Q 134 21.5 134 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="skip-path"/><path d="M 134 31.5 Q 134 53 124 53 H 10 Q 0 53 0 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="loop-path"/><path d="M 72 48 L 67 53 L 72 58" fill="none" stroke="#94a3b8" stroke-width="1.5"/><g transform="translate(10,20)"><g class="any-character"><rect x="0" y="0" width="114" height="23" rx="8" ry="8"/><text x="57" y="15.1666666667" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">any character</text></g></g><line x1="0" y1="31.5" x2="10" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/><line x1="124" y1="31.5" x2="134" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/></g><rect x="-5" y="-5" width="144" height="73" rx="8" ry="8" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="6,3" class="analysis-border"/><circle cx="135" cy="-1" r="8" fill="#e53e3e" class="analysis-badge"/><text x="135" y="3" fill="#fff" text-anchor="middle" class="analysis-badge-label">!</text><title>Adjacent unbounded quantifiers</title></g></g><g transform="translate(308,20)"><g class="literal"><rect x="0" y="0" width="33.4" height="23" rx="8" ry="8"/><text x="16.7" y="15.8333333333" font-family="monospace" font-size="13" text-anchor="middle"><tspan class="quote">&#34;</tspan><tspan>=</tspan><tspan class="quote">&#34;</tspan></text></g></g><g transform="translate(356.4,0)"><g><g class="repeat"><path d="M 0 31.5 Q 0 21.5 10 21.5 H 124 Q 134 21.5 134 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="skip-path"/><path d="M 134 31.5 Q 134 53 124 53 H 10 Q 0 53 0 31.5" fill="none" stroke="#94a3b8" stroke-width="1.5" class="loop-path"/><path d="M 72 48 L 67 53 L 72 58" fill="none" stroke="#94a3b8" stroke-width="1.5"/><g transform="translate(10,20)"><g class="any-character"><rect x="0" y="0" width="114" height="23" rx="8" ry="8"/><text x="57" y="15.1666666667" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">any character</text></g></g><line x1="0" y1="31.5" x2="10" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/><line x1="124" y1="31.5" x2="134" y2="31.5" stroke="#94a3b8" stroke-width="1.5"/></g><rect x="-5" y="-5" width="144" height="73" rx="8" ry="8" fill="none" stroke="#3182ce" stroke-width="2" stroke-dasharray="6,3" class="analysis-border"/><circle cx="135" cy="-1" r="8" fill="#3182ce" class="analysis-badge"/><text x="135" y="3" fill="#fff" text-anchor="middle" class="analysis-badge-label">i</text><title>Trailing .* without anchor</title></g></g></g></g><g class="analysis-legend" transform="translate(10,103)"><g><text x="0" y="13" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e2e8f0" class="analysis-legend-title">Analysis Findings</text><circle cx="5" cy="29" r="5" fill="#3182ce"/><text x="20" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e2e8f0">[info] Pattern has no anchors</text><text x="20" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Adding ^ or $ anchors can help the engine skip impossible starting positions and improve performance.</text><circle cx="5" cy="67" r="5" fill="#e53e3e"/><text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e2e8f0">[error] Adjacent unbounded quantifiers</text><text x="20" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Adjacent unbounded quantifiers cause catastrophic backtracking. The engine tries all combinations of splitting the input between them.</text><text x="20" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" class="analysis-suggestion">Combine into a single quantifier, add a separating literal, or use a non-greedy/possessive modifier.</text><circle cx="5" cy="124" r="5" fill="#3182ce"/><text x="20" y="127" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e2e8f0">[info] Trailing .* without anchor</text><text x="20" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Trailing .* is redundant when using search (not full-match) semantics.</text><text x="20" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" class="analysis-suggestion">Remove the trailing .* or add a $ anchor if full-match is intended.</text><circle cx="5" cy="181" r="5" fill="#3182ce"/><text x="20" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e2e8f0">[info] Leading .* without anchor</text><text x="20" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Leading .* is redundant when using search semantics, as the engine already tries all starting positions.</text><text x="20" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" class="analysis-suggestion">Remove the leading .* or add a ^ anchor if full-match is intended.</text></g></g></svg>