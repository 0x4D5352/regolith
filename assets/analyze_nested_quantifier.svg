"8" fill="#e53e3e" class="analysis-badge"/><text x="105" y="3" fill="#fff" text-anchor="middle" class="analysis-badge-label">!</text><title>Nested quantifiers</title></g></g><g transform="translate(124,23)"><g class="literal"><rect x="0" y="0" width="33.4" height="23" rx="8" ry="8"/><text x="16.7" y="15.8333333333" font-family="monospace" font-size="13" text-anchor="middle"><tspan class="quote">&#34;</tspan><tspan>b</tspan><tspan class="quote">&#34;</tspan></text></g></g></g></g><g class="analysis-legend" transform="translate(10,136)"><g><text x="0" y="13" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#000" class="analysis-legend-title">Analysis Findings</text><circle cx="5" cy="29" r="5" fill="#3182ce"/><text x="20" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#000">[info] Pattern has no anchors</text><text x="20" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">Adding ^ or $ anchors can help the engine skip impossible starting positions and improve performance.</text><circle cx="5" cy="67" r="5" fill="#e53e3e"/><text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#000">[error] Nested quantifiers</text><text x="20" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">An unbounded quantifier applied to a group that itself contains an unbounded quantifier creates exponential backtracking paths.</text><text x="20" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" class="analysis-suggestion">Flatten the expression, use an atomic group (?&gt;...), or use a possessive quantifier if the flavor supports it.</text><circle cx="5" cy="124" r="5" fill="#3182ce"/><text x="20" y="127" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#000">[info] Capturing group never referenced</text><text x="20" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">This capturing group is not referenced by any backreference or recursive reference.</text><text x="20" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" class="analysis-suggestion">Use a non-capturing group (?:...) instead if the capture is not needed.</text></g></g></svg>